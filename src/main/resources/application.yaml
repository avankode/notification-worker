spring:
  application:
    name: notifcation-worker
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USER_NAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  slack:
    webhook-url: ${SLACK_HOOK}